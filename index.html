<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0066cc" />
  <title>Arc Flash Interactive Book</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Arc Flash Interactive Book</h1>
      <p>Read the fixed PDF guide with page controls, zoom, swipe, and offline support.</p>
    </header>

    <section class="reader-controls">
      <button id="prevPage" class="nav-btn">Previous</button>
      <span id="pageIndicator">Page 0 / 0</span>
      <button id="nextPage" class="nav-btn">Next</button>
    </section>

    <section class="reader-controls reader-controls-secondary">
      <button id="zoomOut" class="nav-btn">Zoom -</button>
      <span id="zoomIndicator">100%</span>
      <button id="zoomIn" class="nav-btn">Zoom +</button>
    </section>

    <section id="canvasWrapper" class="canvas-wrapper">
      <canvas id="pdfCanvas" aria-label="PDF page viewer"></canvas>
    </section>

    <div id="status" class="status">Loading the book...</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.15.349/build/pdf.min.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
